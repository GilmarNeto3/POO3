<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Venda de Ingressos - CineSystem</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="../css/estilo.css" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-camera-reels"></i> CineSystem</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Início</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html"><i class="bi bi-film"></i> Filmes</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-salas.html"><i class="bi bi-building"></i> Salas</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html"><i class="bi bi-calendar3"></i> Sessões</a></li>
          <li class="nav-item"><a class="nav-link active" href="venda-ingressos.html"><i class="bi bi-ticket-perforated"></i> Ingressos</a></li>
          <li class="nav-item"><a class="nav-link" href="sessoes.html"><i class="bi bi-list-ul"></i> Programação</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h3 class="mb-4" style="color:#e94560;"><i class="bi bi-ticket-perforated"></i> Venda de Ingressos</h3>

    <div id="msgSucesso" class="alert alert-success d-none">
      <i class="bi bi-check-circle"></i> Ingresso vendido com sucesso!
    </div>

    <div class="card mb-4">
      <div class="card-header"><i class="bi bi-cart"></i> Nova Venda</div>
      <div class="card-body">
        <div class="row g-3">

          <div class="col-md-12">
            <label class="form-label">Sessão</label>
            <select id="sessaoId" class="form-select">
              <option value="">Selecione uma sessão...</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Nome do Cliente</label>
            <input type="text" id="nomeCliente" class="form-control" placeholder="Ex: João Silva" />
          </div>

          <div class="col-md-6">
            <label class="form-label">CPF</label>
            <input type="text" id="cpf" class="form-control" placeholder="Ex: 123.456.789-00" maxlength="14" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Assento</label>
            <input type="text" id="assento" class="form-control" placeholder="Ex: A10" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Tipo de Pagamento</label>
            <select id="pagamento" class="form-select">
              <option value="">Selecione...</option>
              <option>Cartão</option>
              <option>Pix</option>
              <option>Dinheiro</option>
            </select>
          </div>

          <div class="col-12">
            <button class="btn btn-custom" onclick="confirmarVenda()">
              <i class="bi bi-check-circle"></i> Confirmar Venda
            </button>
          </div>

        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><i class="bi bi-list-ul"></i> Ingressos Vendidos</div>
      <div class="card-body p-0">
        <table class="table table-dark table-striped mb-0">
          <thead>
            <tr>
              <th>#</th><th>Sessão</th><th>Cliente</th><th>CPF</th><th>Assento</th><th>Pagamento</th><th>Ação</th>
            </tr>
          </thead>
          <tbody id="tabelaIngressos">
            <tr><td colspan="7" class="text-center text-secondary">Nenhum ingresso vendido ainda.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <footer><p class="mb-0">CineSystem &copy; 2025</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
