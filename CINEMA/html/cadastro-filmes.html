<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Filmes - CineSystem</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="../css/estilo.css" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-camera-reels"></i> CineSystem</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Início</a></li>
          <li class="nav-item"><a class="nav-link active" href="cadastro-filmes.html"><i class="bi bi-film"></i> Filmes</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-salas.html"><i class="bi bi-building"></i> Salas</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html"><i class="bi bi-calendar3"></i> Sessões</a></li>
          <li class="nav-item"><a class="nav-link" href="venda-ingressos.html"><i class="bi bi-ticket-perforated"></i> Ingressos</a></li>
          <li class="nav-item"><a class="nav-link" href="sessoes.html"><i class="bi bi-list-ul"></i> Programação</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h3 class="mb-4" style="color:#e94560;"><i class="bi bi-film"></i> Cadastro de Filmes</h3>

    <div id="msgSucesso" class="alert alert-success d-none">
      <i class="bi bi-check-circle"></i> Filme salvo com sucesso!
    </div>

    <div class="card mb-4">
      <div class="card-header"><i class="bi bi-plus-circle"></i> Novo Filme</div>
      <div class="card-body">
        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Título</label>
            <input type="text" id="titulo" class="form-control" placeholder="Ex: Oppenheimer" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Gênero</label>
            <select id="genero" class="form-select">
              <option value="">Selecione...</option>
              <option>Ação</option>
              <option>Aventura</option>
              <option>Comédia</option>
              <option>Drama</option>
              <option>Ficção Científica</option>
              <option>Terror</option>
              <option>Romance</option>
              <option>Animação</option>
              <option>Documentário</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label">Descrição</label>
            <textarea id="descricao" class="form-control" rows="3" placeholder="Breve descrição do filme..."></textarea>
          </div>

          <div class="col-md-4">
            <label class="form-label">Classificação Indicativa</label>
            <select id="classificacao" class="form-select">
              <option value="">Selecione...</option>
              <option>Livre</option>
              <option>10 anos</option>
              <option>12 anos</option>
              <option>14 anos</option>
              <option>16 anos</option>
              <option>18 anos</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Duração (minutos)</label>
            <input type="number" id="duracao" class="form-control" placeholder="Ex: 120" min="1" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Data de Estreia</label>
            <input type="date" id="estreia" class="form-control" />
          </div>

          <div class="col-12">
            <button class="btn btn-custom" onclick="salvarFilme()">
              <i class="bi bi-floppy"></i> Salvar Filme
            </button>
          </div>

        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><i class="bi bi-list-ul"></i> Filmes Cadastrados</div>
      <div class="card-body p-0">
        <table class="table table-dark table-striped mb-0">
          <thead>
            <tr>
              <th>#</th><th>Título</th><th>Gênero</th><th>Classificação</th><th>Duração</th><th>Estreia</th><th>Ação</th>
            </tr>
          </thead>
          <tbody id="tabelaFilmes">
            <tr><td colspan="7" class="text-center text-secondary">Nenhum filme cadastrado ainda.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <footer><p class="mb-0">CineSystem &copy; 2025</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
